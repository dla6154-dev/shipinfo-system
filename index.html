  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    .category-card, .ship-card, .dangerous-goods-card, .law-card { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out; }
    .category-card:hover, .ship-card:hover, .dangerous-goods-card:hover, .law-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); }
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity:1; transform: translateY(0);} }
    .finding-details { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
    .finding-item.open .finding-details { max-height: 1000px; }
    .finding-item.open .chevron-icon { transform: rotate(180deg); }
    .chevron-icon { transition: transform 0.3s ease; }
    .modal-enter { animation: fadeIn 0.3s ease-in-out; }
    .modal-leave { animation: fadeOut 0.3s ease-in-out; }
@keyframes fadeOut { from { opacity: 1;} to { opacity: 0;} }

/* --- Tab Component Styles (추가) --- */
.tab-btn {
  padding: 0.75rem 1rem;
  font-weight: 600;
  color: #94a3b8; /* text-slate-400 */
  border-bottom: 3px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn:hover {
  color: #f1f5f9; /* text-slate-100 */
}
.tab-btn.active {
  color: #22d3ee; /* text-cyan-400 */
  border-bottom-color: #22d3ee;
}
[role="tabpanel"] {
  /* 패널 전환 시 부드러운 효과 */
  animation: fadeIn 0.3s ease-in-out;
}

/* --- Global Component Styles --- */
    .back-btn { 
      flex-shrink: 0; 
      background-color: #334155; 
      padding: .75rem 1rem; 
      border-radius: 9999px; 
      transition: background-color 0.2s; 
    }
    .back-btn:hover { background-color: #475569; }
    
    .input-style { 
      width: 100%; 
      padding: .75rem 1.25rem; 
      padding-right: 3rem; 
      background-color: #1e293b; 
      border: 2px solid #334155; 
      border-radius: 9999px; 
      outline: none; 
      transition: border-color 0.2s, box-shadow 0.2s; 
      color: white;
    }
    .input-style:focus { 
      border-color: #06b6d4; 
      box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.3); 
    }
    .input-style::placeholder {
      color: #64748b;
    }
    
    .input-icon { 
      position: absolute; 
      right: 1.25rem; 
      top: 50%; 
      transform: translateY(-50%); 
      color: #64748b; 
    }
    
    .icon-style { 
      width: 1.25rem; 
      text-align: center; 
      color: #94a38; 
      margin-right: .5rem; 
    }

    /* --- Keypad Lockscreen Styles --- */
    #keypad-lockscreen {
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: fadeIn 0.3s ease-in-out;
    }
    #keypad-display {
      letter-spacing: 0.5em;
      transition: transform 0.1s ease-in-out;
    }
    #keypad-display.error {
      animation: shake 0.4s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-10px); }
    }
    .keypad-btn {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid #334155;
      border-radius: 50%;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      color: white;
      transition: background-color 0.2s ease;
      -webkit-tap-highlight-color: transparent; /* 모바일 클릭 효과 제거 */
    }
    .keypad-btn:active {
      background-color: rgba(255, 255, 255, 0.2);
    }

    body.timetable-viewer-open {
      overflow: hidden;
    }
    .timetable-preview-btn {
      display: block;
      width: 100%;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .timetable-preview-btn img {
      width: 100%;
      height: auto;
      max-height: 420px;
      object-fit: contain;
      background: #ffffff;
      transition: transform 0.2s ease;
    }
    .timetable-preview-btn:hover img {
      transform: scale(1.01);
    }
    .timetable-viewer-stage {
      position: relative;
      overflow: hidden;
      touch-action: none;
      background:
        radial-gradient(circle at top, rgba(148, 163, 184, 0.18), transparent 40%),
        rgba(2, 6, 23, 0.96);
    }
    .timetable-viewer-stage.can-pan {
      cursor: grab;
    }
    .timetable-viewer-stage.is-dragging {
      cursor: grabbing;
    }
    .timetable-viewer-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transform-origin: center center;
      transition: transform 0.08s ease-out;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      will-change: transform;
    }
    .timetable-viewer-image.is-interacting {
      transition: none;
    }

    .captain-duty-table-wrap {
      border: 1px solid rgba(244, 114, 182, 0.18);
      border-radius: 1.5rem;
      background: rgba(15, 23, 42, 0.7);
      overflow: hidden;
    }
    .captain-duty-table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
    }
    .captain-duty-table th,
    .captain-duty-table td {
      border-right: 1px solid rgba(148, 163, 184, 0.16);
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      padding: 0.6rem 0.4rem;
      text-align: center;
      vertical-align: middle;
      word-break: keep-all;
    }
    .captain-duty-table thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(30, 41, 59, 0.96);
      color: #f8fafc;
    }
    .captain-duty-table thead th:last-child,
    .captain-duty-table tbody td:last-child {
      border-right: none;
    }
    .captain-duty-table tbody tr:last-child th,
    .captain-duty-table tbody tr:last-child td {
      border-bottom: none;
    }
    .captain-duty-table tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .captain-duty-table tbody tr.row-selected th,
    .captain-duty-table tbody tr.row-selected td {
      background: rgba(251, 191, 36, 0.22) !important;
      color: #fde68a !important;
    }
    .captain-duty-ship-name {
      display: block;
      font-size: 0.85rem;
      font-weight: 800;
      color: #f8fafc;
    }
    .captain-duty-date-cell {
      width: 3rem;
      font-weight: 800;
      color: #f8fafc;
      white-space: nowrap;
    }
    .captain-duty-name-cell {
      font-weight: 700;
      color: #e2e8f0;
      background: rgba(15, 23, 42, 0.35);
      font-size: 0.85rem;
    }
    .captain-duty-name-cell.is-relief {
      background: rgba(244, 63, 94, 0.14);
      color: #fecdd3;
    }
    .captain-duty-settings-grid {
      display: grid;
      gap: 1rem;
    }
    .captain-duty-settings-row {
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 1rem;
      background: rgba(15, 23, 42, 0.55);
      padding: 1rem;
    }
    .captain-duty-settings-input {
      width: 100%;
      border: 1px solid rgba(71, 85, 105, 0.9);
      border-radius: 0.85rem;
      background: rgba(15, 23, 42, 0.88);
      color: #f8fafc;
      padding: 0.75rem 0.9rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

      border-color: rgba(244, 114, 182, 0.75);
      box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.18);
    }
    @media (max-width: 768px) {
      .captain-duty-table th,
      .captain-duty-table td {
        padding: 0.45rem 0.25rem;
        font-size: 0.78rem;
      }
    }

  </style>

<body class="bg-slate-900 text-white antialiased">

  <!-- 1) Keypad Lockscreen (Visible by default) -->

      <!-- Keypad Display -->
      <div id="keypad-display" class="h-10 w-48 mx-auto bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-mono border border-slate-700 mb-6">
      </div>

      <!-- Keypad Grid -->
      <div class="grid grid-cols-3 gap-4 max-w-xs mx-auto">
        <button class="keypad-btn" data-key="1">1</button>
        <button class="keypad-btn" data-key="2">2</button>
        <button class="keypad-btn" data-key="3">3</button>
        <button class="keypad-btn" data-key="4">4</button>
        <button class="keypad-btn" data-key="5">5</button>
        <button class="keypad-btn" data-key="6">6</button>
        <button class="keypad-btn" data-key="7">7</button>
        <button class="keypad-btn" data-key="8">8</button>
        <button class="keypad-btn" data-key="9">9</button>
        <button class="keypad-btn !bg-transparent !border-none" data-key="clear">
          <i class="fa-solid fa-delete-left text-xl text-slate-400"></i>
        </button>
        <button class="keypad-btn" data-key="0">0</button>
        <button class="keypad-btn !bg-cyan-600 !border-cyan-500" data-key="enter">
          <i class="fa-solid fa-check text-xl"></i>
        </button>
      </div>
    </div>
  </div>

          if (snap.exists()) {
            const rows = snap.data().rows || [];

            // 현재 화면이 검색 결과/상세 등이라면 재렌더링 위해 섹션 갱신

    function pruneFavoriteShipIds() {
      const validShipIds = new Set((shipData || []).map(ship => String(ship.id)));
      const nextFavoriteShipIds = favoriteShipIds.filter(id => validShipIds.has(String(id)));
      if (nextFavoriteShipIds.length !== favoriteShipIds.length) {
        favoriteShipIds = nextFavoriteShipIds;
        saveFavoriteShipIds();

    function getShipSearchResults(term = '') {
      const normalizedTerm = String(term || '').toLowerCase().trim();
      const otherShips = getOtherShips();
      if (!normalizedTerm) return otherShips;

      const filteredShipIds = new Set();
      otherShips.forEach(ship => {
        if ((ship.name || '').toLowerCase().includes(normalizedTerm) || (ship.type || '').toLowerCase().includes(normalizedTerm)) {
          filteredShipIds.add(String(ship.id));

      (inspectionData || []).forEach(finding => {
        if ((finding.details || '').toLowerCase().includes(normalizedTerm)) {

    function buildWeatherApiUrl(path, { bustCache = false } = {}) {
      const base = `${getWeatherApiBase().replace(/\/+$/, '')}/`;
      const url = new URL(String(path || '').replace(/^\/+/, ''), base);
      if (bustCache) {

    function formatWeatherIsoTimestamp(value) {
      const text = String(value || '').trim();
      if (!text) return '-';
      const parsed = new Date(text);
      if (Number.isNaN(parsed.getTime())) return text;
      return new Intl.DateTimeFormat('ko-KR', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(parsed);
    }

    function formatWeatherCompactTimestamp(value) {
      const text = String(value || '').trim();
      if (!text) return '-';
      if (text.length === 12 && /^\d+$/.test(text)) {
        return `${text.slice(4, 6)}/${text.slice(6, 8)} ${text.slice(8, 10)}:${text.slice(10, 12)}`;
      }
      return formatWeatherIsoTimestamp(text);
    }

    function formatWeatherHhmm(value) {
      const text = String(value || '').trim();
      if (text.length === 4 && /^\d+$/.test(text)) {
        return `${text.slice(0, 2)}:${text.slice(2)}`;

    function buildTideDraftGraphSvg(card) {
      const width = 720;
      const height = 260;
      const padding = { top: 30, right: 18, bottom: 56, left: 18 };
      const plotWidth = width - padding.left - padding.right;
      const plotHeight = height - padding.top - padding.bottom;
      const baseY = height - padding.bottom;
      const parseHmToMinutes = (value) => {
        const [hh, mm] = String(value || '00:00').split(':').map(Number);
        return ((hh || 0) * 60) + (mm || 0);
      };
      const minutesToX = (minutes) => padding.left + (minutes / 1440) * plotWidth;
      const visibleMinutesToX = (minutes) => minutesToX(Math.max(0, Math.min(1440, minutes)));
      const levels = card.points.map(point => point.level);
      const minLevel = Math.min(...levels);
      const maxLevel = Math.max(...levels);
      const range = Math.max(1, maxLevel - minLevel);
      const levelToY = (level) => padding.top + ((maxLevel - level) / range) * plotHeight;
      const points = card.points
        .map((point) => ({
          ...point,
          minutes: parseHmToMinutes(point.time),
          x: visibleMinutesToX(parseHmToMinutes(point.time)),
          y: levelToY(point.level)
        }))
        .sort((a, b) => a.minutes - b.minutes);
      if (!points.length) return '';

      const wrappedPoints = [
        { ...points[points.length - 1], minutes: points[points.length - 1].minutes - 1440 },
        ...points,
        { ...points[0], minutes: points[0].minutes + 1440 }
      ];
      const currentMinutes = parseHmToMinutes(card.currentTime);

      const getCosineLevel = (fromLevel, toLevel, progress) => {
        const midpoint = (fromLevel + toLevel) / 2;
        const amplitude = (fromLevel - toLevel) / 2;
        return midpoint + (amplitude * Math.cos(Math.PI * progress));
      };

      const buildSegmentSamples = (fromPoint, toPoint) => {
        const duration = Math.max(1, toPoint.minutes - fromPoint.minutes);
        const visibleStart = Math.max(0, fromPoint.minutes);
        const visibleEnd = Math.min(1440, toPoint.minutes);
        if (visibleStart > visibleEnd) return [];
        const tStart = (visibleStart - fromPoint.minutes) / duration;
        const tEnd = (visibleEnd - fromPoint.minutes) / duration;
        const segmentCount = Math.max(24, Math.ceil((visibleEnd - visibleStart) / 10));
        const samples = [];
        for (let step = 0; step <= segmentCount; step += 1) {
          const progress = tStart + (((tEnd - tStart) * step) / segmentCount);
          const minutes = fromPoint.minutes + (duration * progress);
          const level = getCosineLevel(fromPoint.level, toPoint.level, progress);
          samples.push({
            x: visibleMinutesToX(minutes),
            y: levelToY(level)
          });
        }
        return samples;
      };

      const sampledCurve = [];
      wrappedPoints.forEach((point, index) => {
        if (index === wrappedPoints.length - 1) return;
        const segmentSamples = buildSegmentSamples(point, wrappedPoints[index + 1]);
        if (!segmentSamples.length) return;
        if (sampledCurve.length) segmentSamples.shift();
        sampledCurve.push(...segmentSamples);
      });

      const curvePath = sampledCurve.length
        ? `M ${sampledCurve.map(point => `${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(' L ')}`
        : '';
      const areaPath = sampledCurve.length
        ? `${curvePath} L ${sampledCurve[sampledCurve.length - 1].x.toFixed(2)} ${baseY} L ${sampledCurve[0].x.toFixed(2)} ${baseY} Z`
        : '';

      const currentSegmentIndex = wrappedPoints.findIndex((point, index) => (
        index < wrappedPoints.length - 1
        && currentMinutes >= point.minutes
        && currentMinutes <= wrappedPoints[index + 1].minutes
      ));
      let currentDotY = sampledCurve[0]?.y ?? (padding.top + plotHeight / 2);
      if (currentSegmentIndex >= 0) {
        const fromPoint = wrappedPoints[currentSegmentIndex];
        const toPoint = wrappedPoints[currentSegmentIndex + 1];
        const duration = Math.max(1, toPoint.minutes - fromPoint.minutes);
        const progress = (currentMinutes - fromPoint.minutes) / duration;
        currentDotY = levelToY(getCosineLevel(fromPoint.level, toPoint.level, progress));
      }
      const currentX = visibleMinutesToX(currentMinutes);
      const tickMinutes = [0, 360, 720, 1080, 1440];
      const tickLabels = ['00', '06', '12', '18', '24'];

      return `
        <svg viewBox="0 0 ${width} ${height}" class="block w-full">
          <defs>
            <linearGradient id="tide-draft-fill-${escapeHtml(card.station)}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(59,130,246,0.26)"></stop>
              <stop offset="100%" stop-color="rgba(59,130,246,0.03)"></stop>
            </linearGradient>
          </defs>
          ${tickMinutes.map((tick, index) => `
            <g>
              <line x1="${visibleMinutesToX(tick)}" y1="${padding.top}" x2="${visibleMinutesToX(tick)}" y2="${baseY}" stroke="${tick === 0 || tick === 1440 ? '#e2e8f0' : '#edf2f7'}" stroke-width="2"></line>
              <text x="${visibleMinutesToX(tick)}" y="${height - 16}" text-anchor="${index === 0 ? 'start' : index === tickMinutes.length - 1 ? 'end' : 'middle'}" font-size="13" font-weight="800" fill="#64748b">${tickLabels[index]}시</text>
            </g>
          `).join('')}
          <line x1="${padding.left}" y1="${baseY}" x2="${width - padding.right}" y2="${baseY}" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"></line>
          <path d="${areaPath}" fill="url(#tide-draft-fill-${escapeHtml(card.station)})"></path>
          <path d="${curvePath}" fill="none" stroke="#0f4c81" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
          <line x1="${currentX}" y1="${padding.top - 6}" x2="${currentX}" y2="${baseY + 10}" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 6"></line>
          <text x="${currentX}" y="${padding.top - 10}" text-anchor="middle" font-size="13" font-weight="800" fill="#f59e0b">${escapeHtml(card.currentTime)}</text>
          ${points.map((point) => {
            const isHigh = point.type === '고조';
            const labelY = isHigh ? point.y - 16 : point.y + 28;
            const levelColor = isHigh ? '#ef4444' : '#2563eb';
            return `
              <g>
                <circle cx="${point.x}" cy="${point.y}" r="7" fill="${levelColor}" stroke="#ffffff" stroke-width="4"></circle>
                <text x="${point.x}" y="${labelY}" text-anchor="middle" font-size="15" font-weight="800" fill="${levelColor}">${escapeHtml(String(point.level))}cm</text>
                <text x="${point.x}" y="${baseY + 26}" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b">${escapeHtml(point.time)}</text>

          <circle cx="${currentX}" cy="${currentDotY}" r="8" fill="#f59e0b" stroke="#ffffff" stroke-width="4"></circle>

    }

    /* ── 조석 네이티브 렌더링 (다크 테마) ──────────────────────────────── */
    function buildTideDarkSvg(card) {
      const width = 720, height = 220;
      const pad = { top: 28, right: 18, bottom: 48, left: 18 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const baseY = height - pad.bottom;
      const parseHm = (v) => { const [h,m] = String(v||'00:00').split(':').map(Number); return (h||0)*60+(m||0); };
      const minToX = (m) => pad.left + (Math.max(0,Math.min(1440,m))/1440)*plotW;
      const levels = card.points.map(p=>p.level);
      const minL = Math.min(...levels), maxL = Math.max(...levels);
      const range = Math.max(1, maxL - minL);
      const lvlToY = (l) => pad.top + ((maxL-l)/range)*plotH;
      const pts = card.points.map(p=>({...p, minutes:parseHm(p.time), x:minToX(parseHm(p.time)), y:lvlToY(p.level)}))
        .sort((a,b)=>a.minutes-b.minutes);
      if (!pts.length) return '';
      const wrapped = [
        {...pts[pts.length-1], minutes:pts[pts.length-1].minutes-1440},
        ...pts,
        {...pts[0], minutes:pts[0].minutes+1440}
      ];
      const curMin = parseHm(card.currentTime);
      const cosLvl = (f,t,p) => { const mid=(f+t)/2, amp=(f-t)/2; return mid+amp*Math.cos(Math.PI*p); };
      const segSamples = (from, to) => {
        const dur=Math.max(1,to.minutes-from.minutes);
        const vs=Math.max(0,from.minutes), ve=Math.min(1440,to.minutes);
        if(vs>ve) return [];
        const ts=(vs-from.minutes)/dur, te=(ve-from.minutes)/dur;
        const n=Math.max(24,Math.ceil((ve-vs)/10));
        return Array.from({length:n+1},(_,i)=>{
          const prog=ts+((te-ts)*i)/n;
          const mm=from.minutes+dur*prog;
          return {x:minToX(mm), y:lvlToY(cosLvl(from.level,to.level,prog))};
        });
      };
      const curve = [];
      wrapped.forEach((p,i)=>{ if(i===wrapped.length-1) return; const s=segSamples(p,wrapped[i+1]); if(!s.length) return; if(curve.length) s.shift(); curve.push(...s); });
      const curvePath = curve.length ? `M ${curve.map(p=>`${p.x.toFixed(2)} ${p.y.toFixed(2)}`).join(' L ')}` : '';
      const areaPath = curve.length ? `${curvePath} L ${curve[curve.length-1].x.toFixed(2)} ${baseY} L ${curve[0].x.toFixed(2)} ${baseY} Z` : '';
      let curDotY = curve[0]?.y ?? (pad.top+plotH/2);
      const segIdx = wrapped.findIndex((p,i)=>i<wrapped.length-1 && curMin>=p.minutes && curMin<=wrapped[i+1].minutes);
      if(segIdx>=0){
        const f=wrapped[segIdx], t=wrapped[segIdx+1];
        curDotY = lvlToY(cosLvl(f.level,t.level,(curMin-f.minutes)/Math.max(1,t.minutes-f.minutes)));
      }
      const curX = minToX(curMin);
      const ticks = [0,360,720,1080,1440], tlbls=['00','06','12','18','24'];
      const gid = `tdark-${escapeHtml(card.station)}`;
      return `<svg viewBox="0 0 ${width} ${height}" class="block w-full">
        <defs>
          <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(96,165,250,0.22)"></stop>
            <stop offset="100%" stop-color="rgba(96,165,250,0.03)"></stop>
          </linearGradient>
        </defs>
        ${ticks.map((t,i)=>`<g>
          <line x1="${minToX(t)}" y1="${pad.top}" x2="${minToX(t)}" y2="${baseY}" stroke="${t===0||t===1440?'#334155':'#1e293b'}" stroke-width="2"></line>
          <text x="${minToX(t)}" y="${height-10}" text-anchor="${i===0?'start':i===ticks.length-1?'end':'middle'}" font-size="13" font-weight="800" fill="#94a3b8">${tlbls[i]}시</text>
        </g>`).join('')}
        <line x1="${pad.left}" y1="${baseY}" x2="${width-pad.right}" y2="${baseY}" stroke="#334155" stroke-width="4" stroke-linecap="round"></line>
        <path d="${areaPath}" fill="url(#${gid})"></path>
        <path d="${curvePath}" fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
        <line x1="${curX}" y1="${pad.top-6}" x2="${curX}" y2="${baseY+10}" stroke="#fbbf24" stroke-width="3" stroke-dasharray="6 6"></line>
        <text x="${curX}" y="${pad.top-10}" text-anchor="middle" font-size="13" font-weight="800" fill="#fbbf24">${escapeHtml(card.currentTime)}</text>
        ${pts.map(p=>{
          const isH=p.type==='고조', lY=isH?p.y-16:p.y+28, clr=isH?'#f87171':'#93c5fd';
          return `<g>
            <circle cx="${p.x}" cy="${p.y}" r="7" fill="${clr}" stroke="#1e293b" stroke-width="4"></circle>
            <text x="${p.x}" y="${lY}" text-anchor="middle" font-size="15" font-weight="800" fill="${clr}">${escapeHtml(String(p.level))}cm</text>
            <text x="${p.x}" y="${baseY+26}" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8">${escapeHtml(p.time)}</text>
          </g>`;
        }).join('')}
        <circle cx="${curX}" cy="${curDotY}" r="8" fill="#fbbf24" stroke="#1e293b" stroke-width="4"></circle>
      </svg>`;
    }

    function tideEntriesToCards(entries, now) {
      const STATION_ORDER = ['목포','암태','향화','옥도','서망','계마'];
      const byStation = {};
      for (const e of entries) {
        if (!byStation[e.stationName]) byStation[e.stationName] = [];
        byStation[e.stationName].push(e);
      }
      const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      const curMin = now.getHours()*60 + now.getMinutes();
      const parseHm = (v) => { const [h,m]=String(v||'00:00').split(':').map(Number); return (h||0)*60+(m||0); };
      const cosLvl = (f,t,p) => { const mid=(f+t)/2, amp=(f-t)/2; return mid+amp*Math.cos(Math.PI*p); };
      const fmtDur = (m) => { const h=Math.floor(m/60), mn=Math.round(m%60); return h>0?`${h}시간 ${mn}분`:`${mn}분`; };
      return STATION_ORDER.filter(s=>byStation[s]).map(stationName => {
        const pts = byStation[stationName]
          .map(e=>({time:e.timeStr, level:Math.round(e.levelCm||0), type:e.tideType, minutes:parseHm(e.timeStr)}))
          .sort((a,b)=>a.minutes-b.minutes);
        if (!pts.length) return null;
        const wrapped = [
          {...pts[pts.length-1], minutes:pts[pts.length-1].minutes-1440},
          ...pts,
          {...pts[0], minutes:pts[0].minutes+1440}
        ];
        let currentLevel = pts[0].level, phase = '정조', nextLabel = '';
        for (let i=0; i<wrapped.length-1; i++) {
          const f=wrapped[i], t=wrapped[i+1];
          if (curMin>=f.minutes && curMin<=t.minutes) {
            const dur=Math.max(1,t.minutes-f.minutes), prog=(curMin-f.minutes)/dur;
            currentLevel = Math.round(cosLvl(f.level,t.level,prog));
            phase = t.type==='고조'?'밀물':'썰물';
            nextLabel = `${t.type}까지 ${fmtDur(t.minutes-curMin)}`;
            break;
          }
        }
        return { station:stationName, currentLevel, phase, nextLabel, currentTime, points:pts.map(p=>({time:p.time,level:p.level,type:p.type})) };
      }).filter(Boolean);
    }

    function buildTideCardDark(card) {
      const isRising = card.phase==='밀물';

            </div>
            <span class="shrink-0 rounded-full bg-slate-700 px-3 py-1.5 text-xs font-bold text-slate-200">${escapeHtml(card.nextLabel)}</span>
          </div>

          ${card.points.map(p=>`<div class="py-3 text-center">

            <p class="text-xs text-slate-400">${escapeHtml(String(p.level))}cm</p>

    async function loadTideCards(container) {
      container.innerHTML = `<div class="flex items-center justify-center py-20">
        <div class="text-center">
          <i class="fa-solid fa-water text-4xl text-blue-400 mb-4 animate-pulse"></i>
          <p class="text-slate-400 text-sm">조석 데이터 불러오는 중...</p>
        </div>
      </div>`;
      try {
        const sbH = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };
        const res = await fetch(`${SUPABASE_URL}/rest/v1/external_api_cache?id=eq.kma-tide-snapshot&select=payload,fetchedAt`, { headers: sbH });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const rows = await res.json();
        if (!rows.length || !rows[0].payload) throw new Error('조석 데이터 캐시 없음');
        const snap = rows[0].payload;
        const entries = snap.entries || snap.Entries || [];
        if (!entries.length) throw new Error('조석 데이터가 비어 있습니다');
        const now = new Date();
        const cards = tideEntriesToCards(entries, now);
        const stale = snap.meta?.stale || snap.Meta?.stale || false;
        const dateStr = snap.dateStr || snap.DateStr || '';
        container.innerHTML = `
          <div class="flex items-center justify-between mb-4">
            <p class="text-sm text-slate-400">${escapeHtml(dateStr)}${stale?'&nbsp;<span class="text-amber-400 text-xs">갱신 대기 중</span>':''}</p>
            <button id="tide-refresh-btn" class="text-xs text-blue-400 hover:text-blue-300 flex items-center gap-1 px-2 py-1 rounded border border-blue-500/30 hover:border-blue-400/50">
              <i class="fa-solid fa-rotate-right"></i> 새로고침
            </button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            ${cards.map(c=>buildTideCardDark(c)).join('')}
          </div>`;
        document.getElementById('tide-refresh-btn')?.addEventListener('click', () => loadTideCards(container));
      } catch (err) {
        container.innerHTML = `<div class="rounded-2xl border border-amber-500/20 bg-amber-500/10 p-8 text-center">
          <i class="fa-solid fa-triangle-exclamation text-amber-400 text-3xl mb-3"></i>
          <p class="text-sm text-amber-300 font-semibold">조석 데이터를 불러오지 못했습니다</p>
          <p class="text-xs text-slate-400 mt-1">${escapeHtml(String(err))}</p>
          <button onclick="loadTideCards(document.getElementById('tide-cards-container'))" class="mt-4 text-xs text-blue-400 hover:text-blue-300 border border-blue-500/30 px-3 py-1.5 rounded">
            <i class="fa-solid fa-rotate-right mr-1"></i>다시 시도
          </button>
        </div>`;
      }
    }
    /* ── End 조석 네이티브 렌더링 ──────────────────────────────────────── */

    function getCurrentCaptainDutyYearMonth() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    }

    function getDefaultCaptainDutyConfig() {
      return {
        yearMonth: getCurrentCaptainDutyYearMonth(),
        rows: DEFAULT_CAPTAIN_DUTY_ROWS.map((row, index) => ({ ...row, id: `captain-duty-${index + 1}` }))
      };
    }

    function clampCaptainDutyDay(value) {
      if (value === '' || value == null) return null;
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return null;
      return Math.min(31, Math.max(1, Math.trunc(parsed)));
    }

    function normalizeCaptainDutyRow(row, index) {
      return {
        id: String(row?.id || `captain-duty-${index + 1}`),
        shipName: String(row?.shipName || '').trim(),
        mainCaptain: String(row?.mainCaptain || '').trim(),
        reliefCaptain: String(row?.reliefCaptain || '').trim(),
        startDay: clampCaptainDutyDay(row?.startDay),
        endDay: clampCaptainDutyDay(row?.endDay)
      };
    }

    function normalizeCaptainDutyConfig(rawConfig) {
      const fallback = getDefaultCaptainDutyConfig();
      const yearMonth = /^\d{4}-\d{2}$/.test(String(rawConfig?.yearMonth || '').trim())
        ? String(rawConfig.yearMonth).trim()
        : fallback.yearMonth;
      const baseRows = Array.isArray(rawConfig?.rows) && rawConfig.rows.length
        ? rawConfig.rows
        : fallback.rows;
      return {
        yearMonth,
        rows: baseRows.map((row, index) => normalizeCaptainDutyRow(row, index))
      };
    }

    function formatCaptainDutyYearMonth(yearMonth) {
      const [year, month] = String(yearMonth || '').split('-');
      if (!year || !month) return '-';
      return `${year}년 ${Number(month)}월`;
    }

    function getCaptainDutyDaysInMonth(yearMonth) {
      const [year, month] = String(yearMonth || '').split('-').map(Number);
      if (!year || !month) return 31;
      return new Date(year, month, 0).getDate();
    }

    function isCaptainDutyReliefActive(row, day) {
      if (!row?.reliefCaptain) return false;
      if (row.startDay == null || row.endDay == null) return false;
      return day >= row.startDay && day <= row.endDay;
    }

    function getCaptainDutyNameForDay(row, day) {
      if (isCaptainDutyReliefActive(row, day)) {
        return row.reliefCaptain || row.mainCaptain || '-';
      }
      return row.mainCaptain || row.reliefCaptain || '-';
    }

    function buildCaptainDutySectionHtml() {
      const config = normalizeCaptainDutyConfig(captainDutyConfig);
      const daysInMonth = getCaptainDutyDaysInMonth(config.yearMonth);
      const headCells = config.rows.map((row) => {
        const periodText = row.startDay != null && row.endDay != null
          ? `${row.startDay}~${row.endDay}일`
          : '교대 없음';
        return `<th scope="col">
          <span class="captain-duty-ship-name">${escapeHtml(row.shipName || '미정')}</span>
        </th>`;
      }).join('');
      const bodyRows = Array.from({ length: daysInMonth }, (_, index) => {
        const day = index + 1;
        const cells = config.rows.map((row) => {
          const isRelief = isCaptainDutyReliefActive(row, day);
          return `<td class="captain-duty-name-cell${isRelief ? ' is-relief' : ''}">${escapeHtml(getCaptainDutyNameForDay(row, day))}</td>`;
        }).join('');
        return `<tr><th scope="row" class="captain-duty-date-cell">${day}일</th>${cells}</tr>`;
      }).join('');

      return `
        <div class="flex items-center gap-4 mb-8">
          <button class="back-btn" data-target="main-menu"><i class="fa-solid fa-arrow-left"></i></button>
          <div class="min-w-0">
            <h2 class="text-2xl font-bold text-rose-400">선장교대</h2>
            <p class="text-sm text-slate-400 mt-1">${escapeHtml(formatCaptainDutyYearMonth(config.yearMonth))} 기준으로 교대기간에는 예비선장이 표시됩니다.</p>
          </div>
          <button id="captain-duty-settings-btn" type="button" class="ml-auto inline-flex items-center gap-2 rounded-full border border-rose-400/30 bg-rose-500/10 px-4 py-2 text-sm font-semibold text-rose-200 hover:bg-rose-500/20">
            <i class="fa-solid fa-gear"></i>
            설정
          </button>
        </div>
        <div class="mb-4 flex flex-wrap items-center gap-3">
          <span class="inline-flex items-center rounded-full bg-slate-800 px-4 py-2 text-sm font-semibold text-slate-200 border border-slate-700">${escapeHtml(formatCaptainDutyYearMonth(config.yearMonth))}</span>
          <span class="inline-flex items-center rounded-full bg-rose-500/10 px-4 py-2 text-sm font-semibold text-rose-200 border border-rose-400/20">분홍색 칸은 예비선장 근무일입니다.</span>
        </div>
        <div class="captain-duty-table-wrap">
          <table class="captain-duty-table">
            <thead>
              <tr>
                <th scope="col" class="captain-duty-date-cell">날짜</th>
                ${headCells}
              </tr>
            </thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>`;
    }

    function buildCaptainDutySettingsModal() {
      const config = normalizeCaptainDutyConfig(captainDutyConfig);
      const rowsHtml = config.rows.map((row, index) => `
        <div class="captain-duty-settings-row" data-captain-duty-row="${index}">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-2">선박명</label>

            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-2">예비 선장</label>
              <input type="text" class="captain-duty-settings-input" data-field="reliefCaptain" value="${escapeHtml(row.reliefCaptain)}" />
            </div>
            <div class="grid grid-cols-2 gap-3">

                <label class="block text-sm font-semibold text-slate-300 mb-2">교대 시작일</label>

    async function handleCaptainDutySettingsSave() {
      const monthInput = document.getElementById('captain-duty-month-input');
      const statusEl = document.getElementById('captain-duty-settings-status');
      const saveBtn = document.getElementById('captain-duty-settings-save-btn');
      const rows = [...document.querySelectorAll('[data-captain-duty-row]')].map((rowEl, index) => ({
        id: `captain-duty-${index + 1}`,
        shipName: rowEl.querySelector('[data-field="shipName"]')?.value || '',
        mainCaptain: rowEl.querySelector('[data-field="mainCaptain"]')?.value || '',
        reliefCaptain: rowEl.querySelector('[data-field="reliefCaptain"]')?.value || '',
        startDay: rowEl.querySelector('[data-field="startDay"]')?.value || '',
        endDay: rowEl.querySelector('[data-field="endDay"]')?.value || ''
      }));

      const normalized = normalizeCaptainDutyConfig({
        yearMonth: monthInput?.value || getCurrentCaptainDutyYearMonth(),
        rows
      });

      const invalidRow = normalized.rows.find((row) => {
        if (!row.shipName || !row.mainCaptain) return true;
        const hasAnyReliefInput = row.reliefCaptain || row.startDay != null || row.endDay != null;
        if (!hasAnyReliefInput) return false;
        if (!row.reliefCaptain || row.startDay == null || row.endDay == null) return true;
        return row.startDay > row.endDay;
      });

      if (statusEl && invalidRow) {
        statusEl.textContent = '선박명과 본선 선장은 필수입니다. 교대기간을 입력할 때는 예비선장과 시작일·종료일을 모두 입력하세요.';
        statusEl.className = 'text-sm text-center text-red-400';
        return;
      }

      if (saveBtn) saveBtn.setAttribute('disabled', 'disabled');
      if (statusEl) {
        statusEl.textContent = '저장 중입니다...';
        statusEl.className = 'text-sm text-center text-amber-300';
      }

      try {
        await saveCaptainDutyConfig(normalized);
        if (!sections['captain-duty-section'].classList.contains('hidden')) {
          renderSection('captain-duty-section');
        }
        if (statusEl) {
          statusEl.textContent = '저장되었습니다. 화면에 바로 반영했습니다.';
          statusEl.className = 'text-sm text-center text-green-400';
        }
        setTimeout(() => hideModal(), 500);
      } catch (error) {
        if (statusEl) {
          statusEl.textContent = `저장 실패: ${error.message}`;
          statusEl.className = 'text-sm text-center text-red-400';
        }
      } finally {
        if (saveBtn) saveBtn.removeAttribute('disabled');
      }
    }

    async function loadWeatherSectionSummary(section, { bustCache = false } = {}) {
      const statusEl = section.querySelector('#weather-summary-status');
      const panelsEl = section.querySelector('#weather-summary-panels');
      if (!statusEl || !panelsEl) return;

      const requestId = ++weatherSectionRequestId;
      statusEl.innerHTML = `<div class="rounded-2xl border border-slate-700 bg-slate-800/80 px-4 py-3 text-sm text-slate-300">날씨 데이터를 불러오는 중...</div>`;
      panelsEl.innerHTML = '';

      try {
        const sbHeaders = {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        };
        const cacheUrl = (id) =>
          `${SUPABASE_URL}/rest/v1/external_api_cache?id=eq.${id}&select=payload,fetchedAt${bustCache ? `&_ts=${Date.now()}` : ''}`;

        const [areaRes, buoyRes] = await Promise.all([
          fetch(cacheUrl('kma-warning-snapshot'), { headers: sbHeaders }),
          fetch(cacheUrl('kma-buoy-snapshot'),    { headers: sbHeaders }),
        ]);

        if (!areaRes.ok || !buoyRes.ok) {
          throw new Error(`Supabase 조회 실패 (${areaRes.status}/${buoyRes.status})`);
        }

        const [areaData, buoyData] = await Promise.all([areaRes.json(), buoyRes.json()]);
        if (requestId !== weatherSectionRequestId) return;

        const areaSnapshot  = areaData[0]?.payload;
        const querySnapshot = buoyData[0]?.payload;
        const fetchedAt     = buoyData[0]?.fetchedAt;

        if (!areaSnapshot || !querySnapshot) {
          throw new Error('캐시 데이터가 아직 준비되지 않았습니다. 1~2분 후 다시 시도해 주세요.');
        }

        statusEl.innerHTML = fetchedAt
          ? `<div class="mb-3 rounded-xl bg-slate-800/60 px-3 py-1.5 text-xs text-slate-400 inline-block">
               <i class="fa-solid fa-circle-check text-emerald-400 mr-1"></i>
               Supabase 캐시 · 갱신 ${new Date(fetchedAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}
             </div>`
          : '';
        panelsEl.innerHTML = buildWeatherSummaryPanels(areaSnapshot, querySnapshot);
      } catch (error) {
        if (requestId !== weatherSectionRequestId) return;
        statusEl.innerHTML = `
          <div class="rounded-2xl border border-red-400/20 bg-red-500/10 px-4 py-4 text-sm text-red-100">
            <i class="fa-solid fa-triangle-exclamation mr-2"></i>${escapeHtml(String(error.message))}
          </div>`;
        panelsEl.innerHTML = '';
      }
    }

    function updateFooter(dateObj) {
      const timestampSpan = document.getElementById('app-footer-timestamp');
      if (timestampSpan) {
        const formatted = new Intl.DateTimeFormat('ko-KR', { dateStyle: 'long', timeStyle: 'short' }).format(dateObj);
        timestampSpan.textContent = `데이터 최종 업데이트: ${formatted}`;
      }
    }

    async function updateFooterFromMeta() {
      const snap = await getDoc(metaDoc());
      if (snap.exists()) {
        const ts = snap.data().lastUpdated?.toDate?.();
        if (ts) updateFooter(ts);
      } else {
        const timestampSpan = document.getElementById('app-footer-timestamp');
        if (timestampSpan) {
          timestampSpan.textContent = '데이터가 없습니다. 관리자 메뉴에서 업로드해주세요.';
        }
      }
    }

    function switchView(targetId, params = null) {
      closeTimetableViewer();
      Object.values(sections).forEach(section => section.classList.add('hidden'));
      sections[targetId]?.classList.remove('hidden');
      renderSection(targetId, params);
      // History API 연동: 뒤로가기(하드웨어) 지원
      if (!_historyNavigation) {
        const state = { section: targetId, params: params || null };
        if (!_appHistoryReady) {
          history.replaceState(state, ''); // 앱 최초 진입 시 현재 엔트리 교체
          _appHistoryReady = true;
        } else {
          history.pushState(state, '');
        }
      }
    }

    // 브라우저/하드웨어 뒤로가기 처리

      if (!_appHistoryReady) return;
      if (!e.state) return; // 앱 진입 이전 히스토리 → 브라우저가 알아서 처리
      const section = e.state.section || 'main-menu';
      const params = e.state.params || null;
      _historyNavigation = true;
      switchView(section, params);
      _historyNavigation = false;
    });

    // ===============================

    function highlight(text, term) {
      if (!term || !text) return text;
      const safe = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${safe})`, 'gi');
      return String(text).replace(regex, '<mark class="bg-yellow-400 text-black px-1 rounded">$1</mark>');
    }

    function formatNumber(value, unit = '') {
      if (value === null || value === undefined || String(value).trim() === '') return 'N/A';
      const num = parseFloat(String(value).replace(/[^0-9.]/g, ''));
      if (isNaN(num)) return value;
      return num.toLocaleString('ko-KR') + (unit ? `${unit}` : '');
    }
    function formatSpeed(value) {
      if (value === null || value === undefined || String(value).trim() === '') return 'N/A';
      const num = parseFloat(String(value).replace(/[^0-9.]/g, ''));
      if (isNaN(num)) return value;
      return `${num.toFixed(1)} kts`;
    }
    function excelDateToJSDate(serial) {
      if (typeof serial === 'string') {
        if (/^\d{4}-\d{2}-\d{2}$/.test(serial)) return new Date(serial);
      }
      if (typeof serial !== 'number') return null;
      const excelEpoch = new Date(1899, 11, 30);
      return new Date(excelEpoch.getTime() + serial * 24 * 60 * 60 * 1000);
    }
    function formatShipDate(dateInput) {
      if (!dateInput) return 'N/A';
      let date = dateInput instanceof Date ? dateInput : excelDateToJSDate(dateInput);
      if (date && !isNaN(date)) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }
      if (typeof dateInput === 'string') return dateInput;
      return 'N/A';
    }
    function getShipAge(launchDateInput) {
      const launchDateStr = formatShipDate(launchDateInput);
      if (launchDateStr === 'N/A') return '계산 불가';
      const t = new Date();
      const a = new Date(launchDateStr);
      if (isNaN(a.getTime())) return '계산 불가';
      let e = t.getFullYear() - a.getFullYear();
      const n = t.getMonth() - a.getMonth();
      if (n < 0 || (n === 0 && t.getDate() < a.getDate())) e--;
      const d = new Date(a.getFullYear() + e, a.getMonth(), a.getDate());
      return `${e}년 ${Math.floor((t - d) / 86400000)}일`;
    }

    // --- 비밀번호 변경 모달 ---
    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getTouchDistance(touches) {
      const [firstTouch, secondTouch] = touches;
      return Math.hypot(secondTouch.clientX - firstTouch.clientX, secondTouch.clientY - firstTouch.clientY);
    }

    function getTouchMidpoint(touches) {
      const [firstTouch, secondTouch] = touches;
      return {
        clientX: (firstTouch.clientX + secondTouch.clientX) / 2,
        clientY: (firstTouch.clientY + secondTouch.clientY) / 2
      };
    }

    function updateTimetableViewerCursor() {
      timetableViewerStage.classList.toggle('can-pan', timetableViewerState.scale > 1);
      timetableViewerStage.classList.toggle('is-dragging', timetableViewerState.isDragging);
    }

    function constrainTimetableViewerTranslation() {
      const stageRect = timetableViewerStage.getBoundingClientRect();
      const imageWidth = timetableViewerImage.offsetWidth;
      const imageHeight = timetableViewerImage.offsetHeight;

      if (!stageRect.width || !stageRect.height || !imageWidth || !imageHeight) return;

      const maxTranslateX = Math.max(0, ((imageWidth * timetableViewerState.scale) - stageRect.width) / 2);
      const maxTranslateY = Math.max(0, ((imageHeight * timetableViewerState.scale) - stageRect.height) / 2);

      timetableViewerState.translateX = clamp(timetableViewerState.translateX, -maxTranslateX, maxTranslateX);
      timetableViewerState.translateY = clamp(timetableViewerState.translateY, -maxTranslateY, maxTranslateY);
    }

    function applyTimetableViewerTransform(isInteracting = false) {
      if (timetableViewerState.scale <= 1) {
        timetableViewerState.translateX = 0;
        timetableViewerState.translateY = 0;
      } else {
        constrainTimetableViewerTranslation();
      }

      timetableViewerImage.classList.toggle('is-interacting', isInteracting);
      timetableViewerImage.style.transform = `translate3d(${timetableViewerState.translateX}px, ${timetableViewerState.translateY}px, 0) scale(${timetableViewerState.scale})`;
      updateTimetableViewerCursor();
    }

    function resetTimetableViewerTransform() {
      timetableViewerState.scale = 1;
      timetableViewerState.translateX = 0;
      timetableViewerState.translateY = 0;
      timetableViewerState.isDragging = false;
      timetableViewerState.pinchStartDistance = 0;
      timetableViewerState.pinchStartScale = 1;
      applyTimetableViewerTransform(false);
    }

    function zoomTimetableViewer(nextScale, pointer = null) {
      const previousScale = timetableViewerState.scale;
      const newScale = clamp(nextScale, timetableViewerState.minScale, timetableViewerState.maxScale);
      if (newScale === previousScale) return;

      if (pointer) {
        const stageRect = timetableViewerStage.getBoundingClientRect();
        const pointerOffsetX = pointer.clientX - stageRect.left - (stageRect.width / 2) - timetableViewerState.translateX;
        const pointerOffsetY = pointer.clientY - stageRect.top - (stageRect.height / 2) - timetableViewerState.translateY;
        const scaleRatio = newScale / previousScale;

        timetableViewerState.translateX -= pointerOffsetX * (scaleRatio - 1);
        timetableViewerState.translateY -= pointerOffsetY * (scaleRatio - 1);
      }

      timetableViewerState.scale = newScale;
      applyTimetableViewerTransform(true);
    }

    function openTimetableViewer(route) {
      if (!route?.image?.trim()) return;

      timetableViewerTitle.textContent = route.name || '시간표';
      timetableViewerDescription.textContent = `${route.description} · 두 손가락 확대/축소, 한 손가락 이동`;
      timetableViewerImage.src = route.image;
      timetableViewerImage.alt = `${route.name || '시간표'} 전체 화면`;
      if (timetableViewerActionBtn) {
        if (route.actionUrl) {
          const actionLabel = route.actionLabel || '열기';
          timetableViewerActionBtn.setAttribute('aria-label', actionLabel);
          timetableViewerActionBtn.setAttribute('title', actionLabel);
          timetableViewerActionBtn.dataset.url = route.actionUrl;
          timetableViewerActionBtn.classList.remove('hidden');
          timetableViewerActionBtn.classList.add('inline-flex');
        } else {
          timetableViewerActionBtn.removeAttribute('title');
          timetableViewerActionBtn.setAttribute('aria-label', '열기');
          timetableViewerActionBtn.dataset.url = '';
          timetableViewerActionBtn.classList.add('hidden');
          timetableViewerActionBtn.classList.remove('inline-flex');
        }
      }
      timetableViewer.classList.remove('hidden');
      document.body.classList.add('timetable-viewer-open');

      const handleImageReady = () => {
        resetTimetableViewerTransform();
        timetableViewerImage.removeEventListener('load', handleImageReady);
      };

      if (timetableViewerImage.complete) {
        requestAnimationFrame(() => resetTimetableViewerTransform());
      } else {
        timetableViewerImage.addEventListener('load', handleImageReady);
      }
    }

    function closeTimetableViewer() {
      if (timetableViewer.classList.contains('hidden')) return;
      timetableViewer.classList.add('hidden');
      document.body.classList.remove('timetable-viewer-open');
      if (timetableViewerActionBtn) {
        timetableViewerActionBtn.dataset.url = '';
        timetableViewerActionBtn.classList.add('hidden');
        timetableViewerActionBtn.classList.remove('inline-flex');
      }
      resetTimetableViewerTransform();
    }

    timetableViewerCloseBtn.addEventListener('click', closeTimetableViewer);
    timetableViewerResetBtn.addEventListener('click', resetTimetableViewerTransform);
    if (timetableViewerActionBtn) {
      timetableViewerActionBtn.addEventListener('click', () => {
        const actionUrl = timetableViewerActionBtn.dataset.url;
        if (actionUrl) window.location.href = actionUrl;
      });
    }
    window.addEventListener('resize', () => {
      if (!timetableViewer.classList.contains('hidden')) {
        requestAnimationFrame(() => applyTimetableViewerTransform(false));
      }
    });
    timetableViewerStage.addEventListener('wheel', (e) => {
      if (timetableViewer.classList.contains('hidden')) return;
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.25 : -0.25;
      zoomTimetableViewer(timetableViewerState.scale + delta, { clientX: e.clientX, clientY: e.clientY });
    }, { passive: false });
    timetableViewerStage.addEventListener('dblclick', (e) => {
      if (timetableViewer.classList.contains('hidden')) return;
      e.preventDefault();
      const nextScale = timetableViewerState.scale > 1 ? 1 : 2;
      zoomTimetableViewer(nextScale, { clientX: e.clientX, clientY: e.clientY });
      if (nextScale === 1) applyTimetableViewerTransform(false);
    });
    timetableViewerStage.addEventListener('mousedown', (e) => {
      if (timetableViewerState.scale <= 1 || timetableViewer.classList.contains('hidden')) return;
      e.preventDefault();
      timetableViewerState.isDragging = true;
      timetableViewerState.lastTouchX = e.clientX;
      timetableViewerState.lastTouchY = e.clientY;
      applyTimetableViewerTransform(true);
    });
    window.addEventListener('mousemove', (e) => {
      if (!timetableViewerState.isDragging) return;
      timetableViewerState.translateX += e.clientX - timetableViewerState.lastTouchX;
      timetableViewerState.translateY += e.clientY - timetableViewerState.lastTouchY;
      timetableViewerState.lastTouchX = e.clientX;
      timetableViewerState.lastTouchY = e.clientY;
      applyTimetableViewerTransform(true);
    });
    window.addEventListener('mouseup', () => {
      if (!timetableViewerState.isDragging) return;
      timetableViewerState.isDragging = false;
      applyTimetableViewerTransform(false);
    });
    timetableViewerStage.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        timetableViewerState.pinchStartDistance = getTouchDistance(e.touches);
        timetableViewerState.pinchStartScale = timetableViewerState.scale;
        timetableViewerState.isDragging = false;
        applyTimetableViewerTransform(true);
        return;
      }

      if (e.touches.length === 1 && timetableViewerState.scale > 1) {
        const touch = e.touches[0];
        timetableViewerState.lastTouchX = touch.clientX;
        timetableViewerState.lastTouchY = touch.clientY;
        timetableViewerState.isDragging = true;
        applyTimetableViewerTransform(true);
      }
    }, { passive: false });
    timetableViewerStage.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        if (!timetableViewerState.pinchStartDistance) {
          timetableViewerState.pinchStartDistance = getTouchDistance(e.touches);
          timetableViewerState.pinchStartScale = timetableViewerState.scale;
        }
        const pinchScale = timetableViewerState.pinchStartScale * (getTouchDistance(e.touches) / timetableViewerState.pinchStartDistance);
        zoomTimetableViewer(pinchScale, getTouchMidpoint(e.touches));
        return;
      }

      if (e.touches.length === 1 && timetableViewerState.isDragging && timetableViewerState.scale > 1) {
        e.preventDefault();
        const touch = e.touches[0];
        timetableViewerState.translateX += touch.clientX - timetableViewerState.lastTouchX;
        timetableViewerState.translateY += touch.clientY - timetableViewerState.lastTouchY;
        timetableViewerState.lastTouchX = touch.clientX;
        timetableViewerState.lastTouchY = touch.clientY;
        applyTimetableViewerTransform(true);
      }
    }, { passive: false });
    timetableViewerStage.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) {
        timetableViewerState.pinchStartDistance = 0;
        timetableViewerState.pinchStartScale = timetableViewerState.scale;
      }
      if (e.touches.length === 1 && timetableViewerState.scale > 1) {
        timetableViewerState.lastTouchX = e.touches[0].clientX;
        timetableViewerState.lastTouchY = e.touches[0].clientY;
        timetableViewerState.isDragging = true;
        applyTimetableViewerTransform(true);
        return;
      }

      timetableViewerState.isDragging = false;
      applyTimetableViewerTransform(false);
    });
    timetableViewerStage.addEventListener('touchcancel', () => {
      timetableViewerState.isDragging = false;
      timetableViewerState.pinchStartDistance = 0;
      timetableViewerState.pinchStartScale = timetableViewerState.scale;
      applyTimetableViewerTransform(false);
    });

        if (changeSubmit && (
            document.getElementById('current-pw')?.matches(':focus') ||
            document.getElementById('new-pw')?.matches(':focus') ||
            document.getElementById('confirm-pw')?.matches(':focus')
        )) {
          changeSubmit.click();
        }
      }
    });

    document.addEventListener('input', async (e) => {
      if (e.target.id === 'excel-upload') handleFileUpload(e);
      const term = (e.target.value || '').toLowerCase().trim();
      if (e.target.id === 'shipSearchInput') {
        shipSearchState.term = term;
        const container = sections['ship-search-section'].querySelector('#ship-results-container');
        const results = getShipSearchResults(term);
        displayShipResults(results, container, term, {
          emptyMessage: term ? '검색된 타선박이 없습니다.' : '즐겨찾기를 제외하면 표시할 타선박이 없습니다.'
        });
      }
      if (e.target.id === 'dangerousGoodsSearchInput') {
        const container = sections['dangerous-goods-search-section'].querySelector('#dangerous-goods-results-container');
        const filtered = term ? (dangerousGoodsData || []).filter(i =>
          (i['UN No.'] && String(i['UN No.']).padStart(4, '0').toLowerCase().includes(term)) ||
          (i['품목'] && i['품목'].toLowerCase().includes(term))
        ) : dangerousGoodsData;
        displayDangerousGoodsResults(filtered, container, term);
      }
    });

    // ===============================
    // 9) 업로드: 엑셀 → Firestore
    // ===============================
    function sanitizeValue(v) {
      if (v === undefined) return null;
      if (typeof v === 'number' && (!isFinite(v) || isNaN(v))) return null;
      return v;
    }
    function sanitizeObject(obj) {
      if (Array.isArray(obj)) return obj.map(sanitizeObject);
      if (obj && typeof obj === 'object') {
        const o = {}; for (const k of Object.keys(obj)) { o[k] = sanitizeObject(obj[k]); }
        return o;
      }
      return sanitizeValue(obj);
    }
    function isRowEmpty(row) {
      if (!row || typeof row !== 'object') return true;
      return Object.values(row).every(v => v === null || String(v).trim?.() === '');
    }
    function sanitizeRows(rows) {
      const out = [];
      for (const r of rows || []) {
        const s = sanitizeObject(r);
        if (!isRowEmpty(s)) out.push(s);
      }
      return out;
    }
    function handleFileUpload(event) {
      const file = event.target.files[0]; if (!file) return;
      const reader = new FileReader();
      const statusDiv = document.getElementById('upload-status');
      statusDiv.textContent = `'${file.name}' 파일을 읽는 중...`; statusDiv.className = 'mt-4 text-sm text-yellow-400';
      reader.onload = async (e) => {
        try {
          const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, { type: 'array' });
          const sheetNames = { '법령': 'lawData', '여객선': 'shipData', '위험물': 'dangerousGoodsData', '지적사항': 'inspectionData', '설비 최소 비치 수량': 'safetyRulesData' };
          const payload = {};
          for (const sheetName in sheetNames) {
            if (workbook.Sheets[sheetName]) {
              let jsonData;
              if (sheetName === '지적사항') {
                const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: null });
                jsonData = rawData.map(row => ({
                  shipId: row['shipId'] ?? row['ShipId'] ?? row['선박ID'] ?? null,
                  date: row['날짜'] ?? row['date'] ?? null,
                  inspectionType: row['점검구분'] ?? row['inspectionType'] ?? null,
                  category: row['지적구분'] ?? row['category'] ?? null,
                  details: row['지적사항'] ?? row['내용'] ?? row['details'] ?? null,
                }));
              } else {
                jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: null });
              }
              if (jsonData) {
                jsonData = sanitizeRows(jsonData);
                payload[sheetNames[sheetName]] = jsonData;
              }
            }
          }
          await saveAllDatasets(payload);
          statusDiv.textContent = '데이터가 성공적으로 업데이트되었습니다! (실시간 배포 완료)';
          statusDiv.className = 'mt-4 text-sm text-green-400';
          setTimeout(() => switchView('main-menu'), 1200);
        } catch (error) {
          console.error(error);
          statusDiv.textContent = `오류: ${error.message}`;
          statusDiv.className = 'mt-4 text-sm text-red-400';
        }
      };
      reader.readAsArrayBuffer(file);
    }

    // ===============================
    // 10) 설비 최소 비치 수량 계산 (기존 로직 유지)
    // ===============================
    function checkCondition(ship, navArea, rule) {
      const shipContext = { ...ship, navigation_area: navArea, totalPersons: (ship.capacity || 0) + (ship.minCrew || 0), L: ship.length };
      for (let i = 1; i <= 3; i++) {
        const prop = rule[`condition${i}_prop`];
        const op = rule[`condition${i}_op`];
        let val = rule[`condition${i}_val`];
        if (!prop) continue;
        const shipVal = shipContext[prop];
        if (shipVal === undefined || shipVal === null) return false;
        if (typeof shipVal === 'number' && typeof val !== 'number') val = parseFloat(val);
        let conditionMet = false;
        switch (op) {
          case '>': conditionMet = shipVal > val; break;
          case '<': conditionMet = shipVal < val; break;
          case '>=': conditionMet = shipVal >= val; break;
          case '<=': conditionMet = shipVal <= val; break;
          case '==': conditionMet = String(shipVal).toLowerCase() == String(val).toLowerCase(); break;
          case '!=': conditionMet = String(shipVal).toLowerCase() != String(val).toLowerCase(); break;
          default: return false;
        }
        if (!conditionMet) return false;
      }
      return true;
    }

    function calculateAndDisplaySafetyEquipment(ship) {
      const navArea = document.getElementById('navigation-area').value;
      const resultsContainer = document.getElementById('safety-results-container');
      if (!ship || !navArea || !resultsContainer || !safetyRulesData) {
        resultsContainer.innerHTML = `<p class="text-red-400 text-center">계산에 필요한 데이터가 부족합니다.</p>`;
        return;
      }
      const equipmentResults = {};
      const shipContext = { ...ship, navigation_area: navArea, totalPersons: (ship.capacity || 0) + (ship.minCrew || 0), L: ship.length };
      (safetyRulesData || []).forEach(rule => {
        if (checkCondition(ship, navArea, rule)) {
          if (!equipmentResults[rule.equipment]) {
            try {
              const { totalPersons, capacity, gt, length, minCrew } = shipContext;
              const quantity = eval(rule.quantity_formula);
              equipmentResults[rule.equipment] = { quantity, unit: rule.unit, description: rule.description, law_provision: rule.law_provision };
            } catch (e) { console.error('Error evaluating formula:', rule.quantity_formula, e); }
          }
        }
      });
      const finalResults = {};
      (safetyRulesData || []).forEach(rule => {
        if (checkCondition(ship, navArea, rule)) {
          try {
            const { totalPersons, capacity, gt, length, minCrew } = shipContext;
            const quantity = eval(rule.quantity_formula);
            const key = rule.equipment.split('(')[0].trim();
            if (!finalResults[key]) finalResults[key] = { items: [], total: 0, provisions: new Set() };
            finalResults[key].items.push({ name: rule.equipment, quantity });
            finalResults[key].total += quantity;
            if (rule.law_provision) finalResults[key].provisions.add(rule.law_provision);
          } catch (e) { /* ignore */ }
        }
      });
      let html = '';
      for (const key in finalResults) {
        const group = finalResults[key];
        const firstItem = (safetyRulesData || []).find(r => r.equipment.startsWith(key));
        // FIX: Join with <br> instead of \n\n because the content is HTML
        const provisionsText = Array.from(group.provisions).join('<br><br>');
        const provisionDataAttr = provisionsText ? `data-provision="${provisionsText.replace(/"/g, '&quot;')}"` : '';
        const clickableClass = provisionsText ? 'cursor-pointer hover:bg-slate-600 transition-colors' : '';
        let label;
        if (group.items.length > 1) {
          const description = group.items.map(item => `${item.name.replace(key, '').trim()} ${item.quantity}`).join(', ').replace(/\(\)/g, '');
          label = `${key} ${description}`;
        } else {
          label = group.items[0].name;
        }
        html += `<div class="result-item ${clickableClass}" ${provisionDataAttr} title="${provisionsText ? '클릭하여 법적 근거 보기' : ''}">
          <span class="result-item-label">${label}</span>
          <span class="result-item-value">${group.total} ${firstItem?.unit || ''}</span>
        </div>`;
      }
      resultsContainer.innerHTML = html || `<p class="text-slate-400 text-center">적용되는 설비 기준이 없습니다.</p>`;
      const style = document.createElement('style');
      style.textContent = `.result-item{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;background-color:#334155;border-radius:.5rem}.result-item-label{color:#cbd5e1;font-size:.9rem; padding-right: 1rem;}.result-item-value{font-weight:bold;color:#f1f5f9;background-color:#475569;padding:.25rem .75rem;border-radius:9999px;font-size:.875rem; flex-shrink: 0;}`;
      resultsContainer.append(style);
    }

    // ===============================
    // 11) 앱 시작 및 키패드 로직
    // ===============================
    
    // 앱 잠금 해제 및 메인 앱 초기화 함수
    async function unlockAndInitializeApp() {
      // 1. 키패드 숨기기
      const lockscreen = document.getElementById('keypad-lockscreen');
      lockscreen.classList.add('modal-leave'); // fadeOut
      setTimeout(() => lockscreen.classList.add('hidden'), 300);

      // 2. 메인 앱 보이기
      appContainer.classList.remove('hidden');
      appContainer.classList.add('modal-enter'); // fadeIn

      switchView('main-menu');
      openManualFromQuery();
      // 3. (중요) 메인 앱 데이터 로드 및 시작
      await loadInitialDatasets();
      subscribeRealtime();
    }

    function openManualFromQuery() {
      const viewerTarget = new URLSearchParams(window.location.search).get('viewer');
      if (viewerTarget === 'visibility-limit') {
        openTimetableViewer(VISIBILITY_LIMIT_MANUAL);
      }
      if (viewerTarget === 'field-duty') {
        openTimetableViewer(FIELD_DUTY_MANUAL);
      }
    }

// --- 키패드 로직 ---
    const keypadDisplay = document.getElementById('keypad-display');
    const keypadMessage = document.getElementById('keypad-message');
    let enteredPassword = "";

    function updateKeypadDisplay() {
      keypadDisplay.textContent = '•'.repeat(enteredPassword.length);
    }

    async function handleKeypadInput(key) { // 1. async 추가
      keypadDisplay.classList.remove('error'); // 에러 효과 제거
      
      if (key === 'clear') {
        enteredPassword = "";
      } else if (key === 'enter') {
        await checkPassword(); // 2. await 추가
      } else {
        // 비밀번호 길이 제한 (예: 16자리)
        if (enteredPassword.length < 16) {
          enteredPassword += key;
        }
      }
      updateKeypadDisplay();
    }

    async function checkPassword() { // 3. async 추가
      // const storedPassword = localStorage.getItem('adminPassword') || '1234'; // --- (삭제) ---
      
      // --- 추가 ---
      const metaSnap = await getDoc(metaDoc());
      const storedPassword = (metaSnap.exists() && metaSnap.data().password) ? metaSnap.data().password : '1234';
      // ---

      if (enteredPassword === storedPassword) {
        keypadMessage.textContent = '인증 성공. 앱을 시작합니다...';
        keypadMessage.className = 'text-green-400 text-sm h-5 mb-4';
        setTimeout(unlockAndInitializeApp, 500); // 0.5초 후 앱 시작
      } else {
        keypadMessage.textContent = '비밀번호가 일치하지 않습니다.';
        keypadMessage.className = 'text-red-400 text-sm h-5 mb-4';
        keypadDisplay.classList.add('error'); // 흔들기 효과
        enteredPassword = "";
        setTimeout(updateKeypadDisplay, 400); // 흔들린 후 비우기
      }
    }

    // 키패드 버튼 이벤트 리스너
    document.getElementById('keypad-lockscreen').addEventListener('click', async (e) => { // 4. async 추가
      const button = e.target.closest('.keypad-btn');
      if (button && button.dataset.key) {
        await handleKeypadInput(button.dataset.key); // 5. await 추가
      }
    });

    // 키보드 입력으로도 키패드 조작
    document.addEventListener('keydown', async (e) => { // 6. async 추가
      // 앱이 잠겨있을 때만 키보드 입력 받기
      if (appContainer.classList.contains('hidden')) {
        e.preventDefault();
        if (e.key >= '0' && e.key <= '9') {
          await handleKeypadInput(e.key); // 7. await 추가
        } else if (e.key === 'Backspace') {
          await handleKeypadInput('clear'); // 8. await 추가 (clear는 동기지만 일관성을 위해)
        } else if (e.key === 'Enter') {
          await handleKeypadInput('enter'); // 9. await 추가
        }
      }
    });

    // (중요) 앱 자동 시작 로직 제거.
    // await loadInitialDatasets();
    // subscribeRealtime();
    // switchView('main-menu');
    // --> 이 로직들은 unlockAndInitializeApp() 함수 내부로 이동됨.
    const isPreviewMode = new URLSearchParams(window.location.search).get('preview') === '1';
    if (isPreviewMode) {
      unlockAndInitializeApp();
    }
  </script>
</body>
